name: Monitoreo de Licitaciones Semanal

on:
  schedule:
    # Ejecutar los lunes a las 8:00 AM (ajustar según preferencia)
    - cron: '0 8 * * 1'
  workflow_dispatch:  # Permite ejecución manual desde GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v3
      
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Ejecutar monitoreo
      env:
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
      run: |
        cd src
        python monitor.py
        
    - name: Guardar reporte como artifact
      uses: actions/upload-artifact@v3
      with:
        name: reporte-semanal
        path: data/reporte_*.html
        retention-days: 30
        
    - name: Actualizar última ejecución
      run: |
        echo '{"last_run": "'$(date -Iseconds)'", "status": "success"}' > data/last_run.json
        
    - name: Commit y push de resultados
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización semanal: $(date +%Y-%m-%d)" && git push)